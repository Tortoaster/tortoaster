version: '3.9'
services:
  frontend:
    image: node:18.3
    user: "$USER_ID:$GROUP_ID"
    volumes: ["./frontend:/app:cached"]
    working_dir: /app/
    command: ["yarn", "run", "dev", "--host"]
    ports: ["3000:3000"]

  backend:
    image: rust:1.61
    depends_on: [redis]
    volumes: [".:/app:cached"]
    working_dir: /app/backend/
    command: ["cargo", "run"]
    ports: ["8000:8000"]
    tty: true
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      RUST_LOG: "debug"

  nginx:
    image: nginx:1.16
    depends_on: [frontend, backend]
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    ports: ["80:80"]
